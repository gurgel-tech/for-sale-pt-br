<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domínio à Venda | Gurgel Tech</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    img {
      max-width: 320px;
      width: 100%;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #2563eb, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 1.15rem;
      margin-bottom: 30px;
      color: #475569;
    }

    .contact {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    a {
      text-decoration: none;
      color: white;
      padding: 14px 20px;
      border-radius: 8px;
      background: linear-gradient(90deg, #2563eb, #10b981);
      font-weight: bold;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="logo.png" alt="Gurgel Tech Logo">

    <h1>Este domínio está à venda</h1>
    <p>Interessado em adquirir este domínio premium? Entre em contato conosco para mais informações.</p>

    <div class="contact">
      <a href="mailto:contact@gurgel.tech">📧 contact@gurgel.tech</a>
      <a href="https://wa.me/5534999025752" target="_blank">💬 Falar no WhatsApp</a>
    </div>
  </div>

  <footer>
    © 2026 Gurgel Tech
  </footer>

</body>
</html>
